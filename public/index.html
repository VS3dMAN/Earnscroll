<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  
  <title>EarnScroll: Screen-Time Gym</title>
  <meta name="description" content="Transform your screen time into real life gains. Work out to unlock social media access with AI-powered exercise tracking.">
  
  <!-- PWA Primary Color -->
  <meta name="theme-color" content="#4F46E5">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#4F46E5">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#4F46E5">
  
  <!-- Mobile Web App Capable -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EarnScroll">
  
  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="shortcut icon" type="image/png" href="/assets/images/favicon.png">
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/assets/images/icon.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/images/icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/assets/images/icon.png">
  
  <!-- Android Chrome Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/icon.png">
  
  <!-- Splash Screens for iOS -->
  <link rel="apple-touch-startup-image" href="/assets/images/splash-icon.png">
  
  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileColor" content="#4F46E5">
  <meta name="msapplication-TileImage" content="/assets/images/icon.png">
  <meta name="msapplication-config" content="none">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="EarnScroll: Screen-Time Gym">
  <meta property="og:description" content="Transform your screen time into real life gains. Work out to unlock social media access with AI-powered exercise tracking.">
  <meta property="og:image" content="/assets/images/icon.png">
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="EarnScroll: Screen-Time Gym">
  <meta name="twitter:description" content="Transform your screen time into real life gains. Work out to unlock social media access with AI-powered exercise tracking.">
  <meta name="twitter:image" content="/assets/images/icon.png">
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Disable automatic detection and formatting -->
  <meta name="format-detection" content="telephone=no">
  
  <!-- Security headers -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html, body, #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #ffffff;
      overscroll-behavior: none;
      touch-action: pan-x pan-y;
    }
    
    #root {
      display: flex;
      flex-direction: column;
    }
    
    /* Loading styles */
    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      background-color: #ffffff;
    }
    
    .app-loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .app-loading-text {
      font-size: 16px;
      color: #6B7280;
      font-weight: 500;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(0.95);
      }
    }
    
    /* PWA standalone mode styles */
    @media all and (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }
    
    /* iOS PWA specific fixes */
    @supports (-webkit-touch-callout: none) {
      body {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>
<body>
  <noscript>
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
      <div>
        <h1 style="font-size: 24px; margin-bottom: 16px; color: #111827;">JavaScript Required</h1>
        <p style="font-size: 16px; color: #6B7280;">EarnScroll requires JavaScript to be enabled. Please enable JavaScript in your browser settings and reload the page.</p>
      </div>
    </div>
  </noscript>
  
  <div id="root">
    <div class="app-loading">
      <img src="/assets/images/icon.png" alt="EarnScroll Logo" class="app-loading-logo">
      <p class="app-loading-text">Loading EarnScroll...</p>
    </div>
  </div>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('[PWA] Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.error('[PWA] Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
